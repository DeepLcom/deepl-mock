include:
  - project: '${CI_PROJECT_NAMESPACE}/ci-libs-for-client-libraries'
    file:
      - '/deepl-mock/.gitlab-ci.yml'
  - template: Security/SAST.gitlab-ci.yml

variables:
  GITLAB_ADVANCED_SAST_ENABLED: 'true'

stages:
  - sast
  - check
  - test
  - build

gitlab-advanced-sast:
  stage: sast
  rules:
    - when: always
  variables:
    SAST_EXCLUDED_PATHS: '$DEFAULT_SAST_EXCLUDED_PATHS,test/'
    GIT_STRATEGY: clone
    KUBERNETES_MEMORY_LIMIT: 8Gi
    SAST_SCANNER_ALLOWED_CLI_OPTS: --multi-core 8

semgrep-sast:
  stage: sast
  rules:
    - when: always
  variables:
    SAST_EXCLUDED_PATHS: '$DEFAULT_SAST_EXCLUDED_PATHS,test/'
    GIT_STRATEGY: clone
    KUBERNETES_MEMORY_LIMIT: 8Gi