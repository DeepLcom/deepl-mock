include:
  - project: '${CI_PROJECT_NAMESPACE}/ci-libs-for-client-libraries'
    file:
      - '/deepl-mock/.gitlab-ci.yml'
  - template: Security/SAST.gitlab-ci.yml

variables:
  GITLAB_ADVANCED_SAST_ENABLED: 'true'

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

stages:
  - check
  - test
  - build

unit-test:
  stage: test
  image: node:lts
  script:
    - npm ci
    - npm start &
    - for i in $(seq 1 30); do curl -sf http://localhost:3000/healthz > /dev/null && break || sleep 1; done
    - DEEPL_SERVER_URL=http://localhost:3000 DEEPL_AUTH_KEY=test:fx npm test

gitlab-advanced-sast:
  stage: check
  rules:
    - when: always
  variables:
    SAST_EXCLUDED_PATHS: '$DEFAULT_SAST_EXCLUDED_PATHS,test/'
    GIT_STRATEGY: clone
    KUBERNETES_MEMORY_LIMIT: 8Gi
    SAST_SCANNER_ALLOWED_CLI_OPTS: --multi-core 8

semgrep-sast:
  stage: check
  rules:
    - when: always
  variables:
    SAST_EXCLUDED_PATHS: '$DEFAULT_SAST_EXCLUDED_PATHS,test/'
    GIT_STRATEGY: clone
    KUBERNETES_MEMORY_LIMIT: 8Gi
